version: '3.8'

services:
  anchor:
    build: .
    volumes:
      - ./notes:/home/anchor/notes
      - anchor-store:/home/anchor/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - anchor-net
    command: ["ingest", "/home/anchor/notes"]

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - anchor-net
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 60s


volumes:
  anchor-store:
  ollama-data:

networks:
  anchor-net:
    driver: bridge
