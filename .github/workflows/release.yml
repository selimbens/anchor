name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Run GoReleaser
      id: release
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

    - name: Generate artifact hashes
      id: hash
      run: |
        cd dist
        sha256sum * > checksums.sha256
        echo "::set-output name=hashes::$(cat checksums.sha256 | base64 -w0)"

    - name: Upload hashes
      uses: actions/upload-artifact@v4
      with:
        name: checksums
        path: dist/checksums.sha256

  test-release:
    runs-on: ${{ matrix.os }}
    needs: goreleaser
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: checksums
        path: checksums/

    - name: Install from release
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          curl -L -o anchor.zip https://github.com/selimbens/anchor/releases/latest/download/anchor_windows_amd64.zip
          unzip anchor.zip
          ./anchor.exe --version
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          curl -L -o anchor.tar.gz https://github.com/selimbens/anchor/releases/latest/download/anchor_darwin_amd64.tar.gz
          tar -xzf anchor.tar.gz
          ./anchor --version
        else
          curl -L -o anchor.tar.gz https://github.com/selimbens/anchor/releases/latest/download/anchor_linux_amd64.tar.gz
          tar -xzf anchor.tar.gz
          ./anchor --version
        fi
      shell: bash

  update-homebrew:
    runs-on: ubuntu-latest
    needs: goreleaser
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Checkout tap repository
      uses: actions/checkout@v4
      with:
        repository: selimbens/homebrew-anchor
        token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

    - name: Update formula
      run: |
        # Update the formula with new version and SHA256
        VERSION=${GITHUB_REF#refs/tags/}
        curl -L "https://github.com/selimbens/anchor/archive/refs/tags/${VERSION}.tar.gz" | sha256sum > sha256.txt
        SHA256=$(awk '{print $1}' sha256.txt)
        
        # Update the formula file
        sed -i.bak "s/url \".*\"/url \"https:\/\/github.com\/selimbens\/anchor\/archive\/refs\/tags\/${VERSION}.tar.gz\"/" Formula/anchor.rb
        sed -i.bak "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Formula/anchor.rb
        
        # Update version in caveats if needed
        sed -i.bak "s/v[0-9]\+\.[0-9]\+\.[0-9]\+/${VERSION}/" Formula/anchor.rb
        
        # Commit and push
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/anchor.rb
        git commit -m "Update anchor to ${VERSION}"
        git push

  docker:
    runs-on: ubuntu-latest
    needs: goreleaser
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/selimbens/anchor
        tags: |
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max